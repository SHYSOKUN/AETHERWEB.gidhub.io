<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether WEBPLAYER</title>
    <style>
        :root { 
            --accent: #9d50bb; 
            --bg-opacity: 0.2; 
            --glow: 15px;
            --glass-blur: 10px;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif; color: white;
            overflow: hidden; background: #000;
        }

        /* THE FILE ENGINE - STRIP EVERYTHING ELSE */
        #video-bg {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -10; transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .app-container {
            display: grid; grid-template-rows: 1fr 100px; height: 100vh;
            background: rgba(0, 0, 0, var(--bg-opacity)); 
            backdrop-filter: blur(var(--glass-blur));
            position: relative; z-index: 1;
        }

        main { padding: 30px; overflow-y: auto; scrollbar-width: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { 
            font-size: 32px; font-weight: 900; color: var(--accent); 
            text-shadow: 0 0 var(--glow) var(--accent); 
        }

        .search-bar { 
            display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.05); 
            padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-bar input { background: transparent; border: none; color: white; flex: 1; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .card:hover { border: 1px solid var(--accent); background: rgba(255,255,255,0.1); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; margin-bottom: 8px; }

        footer { 
            background: rgba(0,0,0,0.85); border-top: 1px solid var(--accent);
            display: grid; grid-template-columns: 1fr 2fr 1.2fr; align-items: center; padding: 0 30px;
        }
        
        #hud-art { width: 50px; height: 50px; border-radius: 6px; border: 1px solid var(--accent); object-fit: cover; }
        .main-btn { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; box-shadow: 0 0 var(--glow) var(--accent); }
        
        .side-tools { display: flex; align-items: center; justify-content: flex-end; gap: 12px; }
        .loop-btn { background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.4; }
        .loop-active { opacity: 1; color: var(--accent); }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #0a0a0a; border: 1px solid var(--accent); width: 400px; border-radius: 20px; padding: 25px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-action { background: var(--accent); border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        input[type="range"] { accent-color: var(--accent); }
    </style>
</head>
<body onclick="startMedia()">

    <video id="video-bg" loop muted playsinline>
        <source src="jujutsu.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <main>
            <div class="header">
                <div class="logo">Aether WEBPLAYER</div>
                <div style="cursor:pointer; font-size: 24px;" onclick="openModal()">⚙️</div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Paste YouTube Link, Playlist, or Search..." onkeydown="if(event.key==='Enter') smartLoad(this.value)">
                <button class="btn-action" style="width:auto;" onclick="smartLoad(document.getElementById('search-input').value)">ENGAGE</button>
            </div>

            <div class="grid" id="main-grid"></div>
        </main>

        <footer>
            <div style="display: flex; align-items: center; gap: 12px;">
                <img id="hud-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <div style="overflow:hidden; font-size: 14px;">
                    <div id="hud-title" style="font-weight:bold; white-space:nowrap;">Domain Expansion</div>
                    <div id="hud-artist" style="opacity:0.6; font-size:12px;">Idle</div>
                </div>
            </div>
            
            <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                <div style="display:flex; gap:20px; align-items:center;">
                    <button class="loop-btn" style="opacity:1" onclick="yt.previousVideo()">⏮</button>
                    <button class="main-btn" id="play-main" onclick="togglePlay()">▶</button>
                    <button class="loop-btn" style="opacity:1" onclick="yt.nextVideo()">⏭</button>
                </div>
                <input type="range" id="seek" style="width:100%" value="0" step="1" oninput="seek(this.value)">
            </div>

            <div class="side-tools">
                <button id="loop-toggle" class="loop-btn" onclick="toggleLoop()">🔁</button>
                <span>🔉</span>
                <input type="range" style="width:80px;" oninput="setVol(this.value)" value="10">
            </div>
        </footer>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-box">
            <h3 style="color:var(--accent); margin-top:0;">Domain Customization</h3>
            
            <div class="setting-row">
                <label>Accent Color</label>
                <input type="color" value="#9d50bb" oninput="updateUI('accent', this.value)">
            </div>

            <div class="setting-row">
                <label>Glow Intensity</label>
                <input type="range" min="0" max="40" value="15" oninput="updateUI('glow', this.value)">
            </div>

            <div class="setting-row">
                <label>UI Opacity</label>
                <input type="range" min="0" max="100" value="20" oninput="updateUI('opacity', this.value)">
            </div>

            <div class="setting-row">
                <label>Glass Blur</label>
                <input type="range" min="0" max="25" value="10" oninput="updateUI('blur', this.value)">
            </div>

            <button class="btn-action" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <div id="yt-engine" style="position: absolute; top: -9999px;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, isLooping = false;
        const instances = ["https://pipedapi.kavin.rocks", "https://api.piped.video"];

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0, 'listType': 'playlist' },
                events: { 
                    'onReady': (e) => e.target.setVolume(10),
                    'onStateChange': (e) => { 
                        if(e.data === 1) {
                            const data = yt.getVideoData();
                            document.getElementById('hud-title').innerText = data.title;
                            document.getElementById('hud-artist').innerText = data.author;
                            document.getElementById('play-main').innerText = '⏸';
                            setInterval(updateProg, 1000);
                        }
                        if(e.data === 0 && isLooping) yt.playVideo(); 
                    }
                }
            });
        }

        function startMedia() {
            const v = document.getElementById('video-bg');
            if(v.paused) v.play();
        }

        async function smartLoad(input) {
            if(!input) return;
            const plMatch = input.match(/[?&]list=([^#\&\?]+)/);
            const vidMatch = input.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);

            if(plMatch) {
                yt.loadPlaylist({listType: 'playlist', list: plMatch[1]});
            } else if(vidMatch) {
                yt.loadVideoById(vidMatch[1]);
            } else {
                search(input);
            }
        }

        async function search(q) {
            for (let base of instances) {
                try {
                    const res = await fetch(`${base}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                    const data = await res.json();
                    const grid = document.getElementById('main-grid');
                    grid.innerHTML = '';
                    data.items.slice(0, 12).forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => yt.loadVideoById(s.url.split('v=')[1]);
                        card.innerHTML = `<img src="${s.thumbnail}"><div>${s.title}</div>`;
                        grid.appendChild(card);
                    });
                    return;
                } catch(e) { continue; }
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            document.getElementById('loop-toggle').classList.toggle('loop-active', isLooping);
        }

        function togglePlay() {
            if(yt.getPlayerState() === 1) yt.pauseVideo(); else yt.playVideo();
        }

        function updateUI(type, val) {
            const root = document.documentElement;
            if(type === 'accent') root.style.setProperty('--accent', val);
            if(type === 'opacity') root.style.setProperty('--bg-opacity', val/100);
            if(type === 'glow') root.style.setProperty('--glow', val + 'px');
            if(type === 'blur') root.style.setProperty('--glass-blur', val + 'px');
        }

        function openModal() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('settings-modal').style.display = 'none'; }
        function updateProg() { document.getElementById('seek').max = yt.getDuration(); document.getElementById('seek').value = yt.getCurrentTime(); }
        function setVol(v) { yt.setVolume(v); }
        function seek(v) { yt.seekTo(v); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether | Jujutsu Edition</title>
    <style>
        :root { 
            --accent: #9d50bb; 
            --bg-overlay: rgba(0, 0, 0, 0.8); 
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --card-size: 150px;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-main);
            overflow: hidden; background: #000;
        }

        /* THE BACKGROUND FIX */
        #video-bg {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: -1; object-fit: cover;
            filter: brightness(0.4);
        }

        .app-container {
            display: grid;
            grid-template-rows: 1fr 85px;
            height: 100vh;
            background: var(--bg-overlay);
        }

        main { padding: 20px 30px; overflow-y: auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 28px; font-weight: 900; color: var(--accent); letter-spacing: -1.5px; text-shadow: 0 0 15px var(--accent); }
        
        .search-row { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; }
        
        input { 
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 6px; color: white; padding: 10px 15px; font-size: 14px; 
            outline: none; flex: 1;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.15); }

        .btn-play { 
            background: var(--accent); border: none; color: white; padding: 0 15px; 
            border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-size), 1fr)); gap: 15px; }
        .card { 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; 
            cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05);
        }
        .card:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 6px; margin-bottom: 10px; }
        .card-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-artist { font-size: 12px; color: var(--text-sub); }

        footer { 
            background: rgba(5,5,5,0.98); border-top: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .track-info { display: flex; align-items: center; gap: 12px; width: 250px; }
        #hud-art { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; border: 1px solid var(--accent); }
        #hud-title { font-size: 13px; font-weight: 700; }
        #hud-artist { font-size: 11px; color: var(--text-sub); }

        .controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; max-width: 450px; }
        .play-btn { 
            background: white; border: none; width: 35px; height: 35px; border-radius: 50%; 
            cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
        }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 8px; font-size: 10px; font-family: monospace; }
        input[type="range"] { flex: 1; accent-color: var(--accent); height: 3px; cursor: pointer; }

        #settings-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 1000; align-items: center; justify-content: center; 
        }
        .settings-content { 
            background: #111; padding: 25px; border-radius: 15px; width: 350px; 
            border: 1px solid var(--accent);
        }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-bg">
        <source src="Jujutsu.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <main>
            <div class="header">
                <div class="logo">AETHER</div>
                <div style="cursor:pointer; font-size: 20px;" onclick="toggleSettings()">⚙️</div>
            </div>

            <div class="search-row">
                <input type="text" id="universal-search" placeholder="Search..." onkeydown="if(event.key==='Enter') search(this.value)">
                <input type="text" id="url-input" style="flex: 0.4;" placeholder="Paste Link...">
                <button class="btn-play" onclick="handleLink(document.getElementById('url-input').value)">LOAD</button>
            </div>

            <div class="grid" id="main-grid"></div>
        </main>

        <footer>
            <div class="track-info">
                <img id="hud-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <div>
                    <div id="hud-title">Aether Tuner</div>
                    <div id="hud-artist">Standing by...</div>
                </div>
            </div>

            <div class="controls">
                <button class="play-btn" id="play-main" onclick="togglePlay()">▶</button>
                <div class="progress-container">
                    <span id="time-curr">0:00</span>
                    <input type="range" id="seek" value="0" step="1" oninput="seek(this.value)">
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div style="width: 250px; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
                <span style="font-size: 14px;">🔊</span>
                <input type="range" style="width: 80px;" oninput="setVol(this.value)" value="80">
            </div>
        </footer>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h3 style="color:var(--accent); margin-top:0;">Domain Control</h3>
            <div class="setting-row">
                <label>Theme Color</label>
                <input type="color" id="color-picker" value="#9d50bb" oninput="updateTheme(this.value)">
            </div>
            <div class="setting-row">
                <label>Background Dim</label>
                <input type="range" min="0" max="100" value="40" oninput="document.getElementById('video-bg').style.filter = `brightness(${this.value/100})` ">
            </div>
            <button class="btn-play" style="width:100%; padding:10px; margin-top:5px;" onclick="toggleSettings()">CLOSE</button>
        </div>
    </div>

    <div id="yt-engine" style="display:none;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt;
        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', { events: { 'onStateChange': onStateChange } });
        }

        function updateTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('aether-color', color);
        }

        async function handleLink(url) {
            if(!url) return;
            const res = await fetch(`https://api.song.link/v1-alpha.1/links?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const track = data.entitiesByUniqueId[Object.keys(data.entitiesByUniqueId)[0]];
            playTrack(track.title + " " + track.artistName, track.title, track.artistName, track.thumbnailUrl);
        }

        async function search(q) {
            const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=music_songs`);
            const data = await res.json();
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            data.items.slice(0, 15).forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => playTrack(s.title + " " + s.uploaderName, s.title, s.uploaderName, s.thumbnail);
                card.innerHTML = `<img src="${s.thumbnail}"><div class="card-title">${s.title}</div><div class="card-artist">${s.uploaderName}</div>`;
                grid.appendChild(card);
            });
        }

        async function playTrack(query, title, artist, art) {
            const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_songs`);
            const data = await res.json();
            const id = data.items[0].url.split('v=')[1];
            yt.loadVideoById(id);
            document.getElementById('hud-title').innerText = title;
            document.getElementById('hud-artist').innerText = artist;
            document.getElementById('hud-art').src = art;
            document.getElementById('play-main').innerText = '⏸';
        }

        function togglePlay() {
            const s = yt.getPlayerState();
            if(s === 1) { yt.pauseVideo(); document.getElementById('play-main').innerText = '▶'; }
            else { yt.playVideo(); document.getElementById('play-main').innerText = '⏸'; }
        }

        function onStateChange(e) {
            if(e.data === 1) {
                setInterval(() => {
                    const d = yt.getDuration(), c = yt.getCurrentTime();
                    document.getElementById('seek').max = d;
                    document.getElementById('seek').value = c;
                    document.getElementById('time-curr').innerText = fmt(c);
                    document.getElementById('time-total').innerText = fmt(d);
                }, 1000);
            }
        }

        function toggleSettings() {
            const m = document.getElementById('settings-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function fmt(s) { 
            const m = Math.floor(s/60);
            const sec = Math.floor(s%60);
            return m + ":" + String(sec).padStart(2,'0'); 
        }
        function setVol(v) { yt.setVolume(v); }
        function seek(v) { yt.seekTo(v); }

        window.onload = () => {
            const saved = localStorage.getItem('aether-color');
            if(saved) {
                updateTheme(saved);
                document.getElementById('color-picker').value = saved;
            }
        };
    </script>
</body>
</html>

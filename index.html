<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff0033; 
            --ui-bg: rgba(0, 0, 0, 0.6); 
        }
        
        /* NO BLACK BACKGROUND - VIDEO ONLY */
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', sans-serif; color: white;
            overflow: hidden; background: none; 
        }

        #video-container {
            position: fixed; inset: 0; width: 100vw; height: 100vh;
            z-index: -2; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        #video-bg {
            min-width: 100%; min-height: 100%; width: auto; height: auto;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.6);
        }

        header { 
            height: 80px; display: flex; align-items: center; justify-content: center;
            padding: 0 40px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 100; position: relative;
        }

        .search-bar {
            width: 700px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.2);
            padding: 14px 20px; color: white; font-size: 16px; border-radius: 8px; outline: none;
            backdrop-filter: blur(10px); transition: 0.2s;
        }
        .search-bar:focus { border-color: var(--accent); background: rgba(0,0,0,0.8); }

        .grid { 
            position: absolute; top: 100px; bottom: 120px; left: 0; right: 0;
            padding: 0 40px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; overflow-y: auto; scrollbar-width: none;
        }
        .card { cursor: pointer; border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 10px; font-size: 14px; font-weight: 700; }

        footer {
            position: fixed; bottom: 0; width: 100%; height: 110px;
            background: var(--ui-bg); border-top: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; box-sizing: border-box; backdrop-filter: blur(20px);
        }

        .t-info { display: flex; align-items: center; gap: 15px; width: 300px; }
        #track-art { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; }
        #track-name { font-size: 16px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .p-btn { width: 50px; height: 50px; border-radius: 50%; background: #fff; color: #000; border: none; cursor: pointer; font-size: 20px; }
        .p-btn:hover { background: var(--accent); color: #fff; }
        
        #scrub { width: 100%; max-width: 500px; accent-color: var(--accent); cursor: pointer; }

        .vol { width: 300px; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        #v-val { font-weight: 900; color: var(--accent); min-width: 30px; }
    </style>
</head>
<body onclick="unlock()">

    <div id="video-container">
        <video autoplay muted loop playsinline id="video-bg">
            <source src="Akatsuki.mp4" type="video/mp4">
        </video>
    </div>

    <header>
        <input type="text" class="search-bar" id="mSearch" placeholder="Paste Song URL or Type Name..." onkeydown="if(event.key==='Enter') handle(this.value)">
    </header>

    <div class="grid" id="grid"></div>

    <footer>
        <div class="t-info">
            <img id="track-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="track-name">Aether Player</div>
        </div>

        <div class="controls">
            <div style="display:flex; gap:30px; align-items:center;">
                <button onclick="yt.previousVideo()" style="background:none; border:none; color:#888; cursor:pointer; font-weight:bold;">PREV</button>
                <button class="p-btn" id="m-play" onclick="toggleP()">▶</button>
                <button onclick="yt.nextVideo()" style="background:none; border:none; color:#888; cursor:pointer; font-weight:bold;">NEXT</button>
            </div>
            <input type="range" id="scrub" value="0" step="1" oninput="seek(this.value)">
        </div>

        <div class="vol">
            <span id="v-val">20</span>
            <input type="range" oninput="setV(this.value)" value="20" min="0" max="100" style="accent-color:var(--accent);">
        </div>
    </footer>

    <div id="player" style="position:absolute; top:-999px;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, unlocked = false;

        function unlock() {
            if(!unlocked) {
                document.getElementById('video-bg').play();
                if(yt && yt.playVideo) yt.playVideo();
                unlocked = true;
            }
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0, 'enablejsapi': 1, 'rel': 0 },
                events: { 
                    'onReady': (e) => { e.target.setVolume(20); }, 
                    'onStateChange': (e) => {
                        if(e.data === 1) {
                            document.getElementById('track-name').innerText = yt.getVideoData().title;
                            document.getElementById('m-play').innerText = '⏸';
                            setInterval(() => {
                                document.getElementById('scrub').max = yt.getDuration();
                                document.getElementById('scrub').value = yt.getCurrentTime();
                            }, 500);
                        } else {
                            document.getElementById('m-play').innerText = '▶';
                        }
                    }
                }
            });
        }

        function handle(val) {
            if(!val) return;
            const id = extract(val);
            if(id) {
                yt.loadVideoById(id);
                document.getElementById('track-art').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            } else {
                search(val);
            }
            document.getElementById('mSearch').value = '';
        }

        function extract(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function search(q) {
            const r = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=music_songs`);
            const d = await r.json();
            if(d.items && d.items.length > 0) {
                const id = d.items[0].url.split('v=')[1];
                yt.loadVideoById(id);
                document.getElementById('track-art').src = d.items[0].thumbnail;
                const g = document.getElementById('grid'); g.innerHTML = '';
                d.items.slice(0, 12).forEach(i => {
                    const div = document.createElement('div'); div.className = 'card';
                    div.onclick = () => { yt.loadVideoById(i.url.split('v=')[1]); document.getElementById('track-art').src = i.thumbnail; };
                    div.innerHTML = `<img src="${i.thumbnail}"><div class="card-info">${i.title}</div>`;
                    g.appendChild(div);
                });
            }
        }

        function toggleP() { yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo(); }
        function setV(v) { yt.setVolume(v); document.getElementById('v-val').innerText = v; }
        function seek(v) { yt.seekTo(v); }
    </script>
</body>
</html>

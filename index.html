<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #9d50bb; 
            --bg-opacity: 0.2; 
            --glow: 12px;
            --glass-blur: 10px;
            --font-header: 'Bebas Neue', sans-serif;
            --font-ui: 'Outfit', sans-serif;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: var(--font-ui); color: white;
            overflow: hidden; background: #000;
        }

        /* SCANLINE EFFECT */
        body::before {
            content: " ";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #video-bg {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -10; transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .app-container {
            display: grid; grid-template-rows: 1fr 100px; height: 100vh;
            background: rgba(0, 0, 0, var(--bg-opacity)); 
            backdrop-filter: blur(var(--glass-blur));
            position: relative; z-index: 1;
        }

        main { padding: 30px; overflow-y: auto; scrollbar-width: none; }

        .logo { 
            font-family: var(--font-header); font-size: 42px; letter-spacing: 4px; font-style: italic;
            color: var(--accent); text-shadow: 0 0 var(--glow) var(--accent);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .search-bar { 
            display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.05); 
            padding: 12px; border-radius: 4px; border-left: 4px solid var(--accent);
        }
        .search-bar input { background: transparent; border: none; color: white; flex: 1; outline: none; font-family: var(--font-ui); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 0; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .card:hover { border: 1px solid var(--accent); background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card div { font-family: var(--font-ui); font-size: 11px; text-transform: uppercase; margin-top: 8px; letter-spacing: 1px; }

        footer { 
            background: rgba(0,0,0,0.95); border-top: 2px solid var(--accent);
            display: grid; grid-template-columns: 1fr 2fr 1.2fr; align-items: center; padding: 0 30px; z-index: 20;
        }
        
        #hud-title { font-family: var(--font-header); font-size: 20px; color: var(--accent); }
        #hud-artist { font-family: var(--font-ui); font-size: 10px; text-transform: uppercase; opacity: 0.6; }

        .main-btn { background: var(--accent); color: white; border: none; width: 45px; height: 45px; cursor: pointer; font-size: 20px; transform: skewX(-10deg); }

        /* MODAL FIX */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .modal-box { background: #080808; border: 2px solid var(--accent); width: 450px; padding: 30px; position: relative; }
        .modal-box h2 { font-family: var(--font-header); font-size: 38px; margin: 0 0 20px 0; color: var(--accent); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .setting-row label { font-size: 12px; text-transform: uppercase; font-weight: 900; color: #888; }

        .btn-action { 
            font-family: var(--font-header); font-size: 18px; letter-spacing: 2px;
            background: var(--accent); border: none; color: white; padding: 12px 25px; cursor: pointer; transform: skewX(-10deg);
        }

        input[type="range"] { accent-color: var(--accent); width: 120px; }
    </style>
</head>
<body onclick="document.getElementById('video-bg').play()">

    <video id="video-bg" loop muted playsinline>
        <source src="jujutsu.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <main>
            <div class="header">
                <div class="logo">Aether WEBPLAYER</div>
                <div style="display:flex; gap:25px;">
                    <span style="cursor:pointer; font-size: 20px; opacity:0.7;" onclick="toggleModal('credits-modal')">CREDITS</span>
                    <span style="cursor:pointer; font-size: 20px; color:var(--accent);" onclick="toggleModal('settings-modal')">SETTINGS</span>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="// LINK OR KEYWORD..." onkeydown="if(event.key==='Enter') smartLoad(this.value)">
                <button class="btn-action" onclick="smartLoad(document.getElementById('search-input').value)">LOAD</button>
            </div>

            <div class="grid" id="main-grid"></div>
        </main>

        <footer>
            <div style="display: flex; align-items: center; gap: 12px;">
                <img id="hud-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="50" height="50">
                <div>
                    <div id="hud-title">IDLE_STATE</div>
                    <div id="hud-artist">System Standing By</div>
                </div>
            </div>
            
            <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                <div style="display:flex; gap:40px; align-items:center;">
                    <button style="background:none; border:none; color:white; font-size:22px; cursor:pointer;" onclick="yt.previousVideo()">⏮</button>
                    <button class="main-btn" id="play-main" onclick="togglePlay()">▶</button>
                    <button style="background:none; border:none; color:white; font-size:22px; cursor:pointer;" onclick="yt.nextVideo()">⏭</button>
                </div>
                <input type="range" id="seek" style="width:100%" value="0" step="1" oninput="seek(this.value)">
            </div>

            <div style="display:flex; justify-content:flex-end; align-items:center; gap:20px;">
                <button id="loop-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; opacity:0.3;" onclick="toggleLoop()">🔁</button>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-family: var(--font-header); font-size:14px;">VOL</span>
                    <input type="range" oninput="setVol(this.value)" value="10">
                </div>
            </div>
        </footer>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>DOMAIN_SETTINGS</h2>
            <div class="setting-row">
                <label>Accent_Pulse</label>
                <input type="color" value="#9d50bb" oninput="updateUI('accent', this.value)">
            </div>
            <div class="setting-row">
                <label>Glow_Drive</label>
                <input type="range" min="0" max="40" value="12" oninput="updateUI('glow', this.value)">
            </div>
            <div class="setting-row">
                <label>UI_Visibility</label>
                <input type="range" min="0" max="100" value="20" oninput="updateUI('opacity', this.value)">
            </div>
            <div class="setting-row">
                <label>Playback_Speed</label>
                <input type="range" min="50" max="200" value="100" oninput="updateUI('speed', this.value)">
            </div>
            <button class="btn-action" onclick="toggleModal('settings-modal')">SYNC_CLOSE</button>
        </div>
    </div>

    <div id="credits-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>SYSTEM_CREDITS</h2>
            <p style="font-size:12px; letter-spacing:1px; line-height:2;">
                CORE: AETHER ENGINE v3.5<br>
                UI: NEON SHONEN INTERFACE<br>
                BG: JUJUTSU.MP4<br>
                CODE: ADAPTIVE_AI_COLLAB
            </p>
            <button class="btn-action" onclick="toggleModal('credits-modal')">RETURN</button>
        </div>
    </div>

    <div id="yt-engine" style="position: absolute; top: -9999px;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, isLooping = false;
        const instances = ["https://pipedapi.kavin.rocks", "https://api.piped.video"];

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 
                    'onReady': (e) => e.target.setVolume(10),
                    'onStateChange': (e) => { 
                        if(e.data === 1) {
                            const data = yt.getVideoData();
                            document.getElementById('hud-title').innerText = data.title.toUpperCase();
                            document.getElementById('hud-artist').innerText = data.author.toUpperCase();
                            document.getElementById('play-main').innerText = '⏸';
                            setInterval(updateProg, 1000);
                        }
                        if(e.data === 0 && isLooping) yt.playVideo(); 
                    }
                }
            });
        }

        async function smartLoad(input) {
            if(!input) return;
            const plMatch = input.match(/[?&]list=([^#\&\?]+)/);
            const vidMatch = input.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            if(plMatch) yt.loadPlaylist({listType: 'playlist', list: plMatch[1]});
            else if(vidMatch) yt.loadVideoById(vidMatch[1]);
            else search(input);
        }

        async function search(q) {
            for (let base of instances) {
                try {
                    const res = await fetch(`${base}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                    const data = await res.json();
                    const grid = document.getElementById('main-grid');
                    grid.innerHTML = '';
                    data.items.slice(0, 12).forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => yt.loadVideoById(s.url.split('v=')[1]);
                        card.innerHTML = `<img src="${s.thumbnail}"><div>${s.title}</div>`;
                        grid.appendChild(card);
                    });
                    return;
                } catch(e) { continue; }
            }
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleLoop() {
            isLooping = !isLooping;
            document.getElementById('loop-btn').style.opacity = isLooping ? "1" : "0.3";
            document.getElementById('loop-btn').style.color = isLooping ? "var(--accent)" : "white";
        }

        function togglePlay() { if(yt.getPlayerState() === 1) yt.pauseVideo(); else yt.playVideo(); }
        
        function updateUI(type, val) {
            const root = document.documentElement;
            if(type === 'accent') root.style.setProperty('--accent', val);
            if(type === 'glow') root.style.setProperty('--glow', val + 'px');
            if(type === 'opacity') root.style.setProperty('--bg-opacity', val/100);
            if(type === 'speed') yt.setPlaybackRate(val/100);
        }

        function updateProg() { document.getElementById('seek').max = yt.getDuration(); document.getElementById('seek').value = yt.getCurrentTime(); }
        function setVol(v) { yt.setVolume(v); }
        function seek(v) { yt.seekTo(v); }
    </script>
</body>
</html>

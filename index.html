<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether WEBPLAYER</title>
    <style>
        :root { 
            --accent: #9d50bb; 
            --bg-overlay: rgba(0, 0, 0, 0.7); 
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --card-size: 170px;
            --glass-blur: 15px;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-main);
            overflow: hidden; background: #000;
        }

        /* FIXED VIDEO ENGINE */
        #video-bg {
            position: fixed; inset: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(0.4) saturate(1.1);
            pointer-events: none;
        }

        .app-container {
            display: grid; grid-template-rows: 1fr 100px; height: 100vh;
            background: var(--bg-overlay); backdrop-filter: blur(var(--glass-blur));
        }

        main { padding: 30px; overflow-y: auto; scrollbar-width: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 32px; font-weight: 900; color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        .search-bar { 
            display: flex; gap: 10px; margin-bottom: 30px; background: rgba(255,255,255,0.05); 
            padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-bar input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-size), 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .card:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 10px; margin-bottom: 10px; }

        footer { 
            background: rgba(0,0,0,0.95); border-top: 1px solid var(--accent);
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 30px;
        }
        #hud-art { width: 60px; height: 60px; border-radius: 8px; border: 1px solid var(--accent); object-fit: cover; }

        .main-btn { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        /* SETTINGS & MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #0f0f0f; border: 1px solid var(--accent); width: 450px; border-radius: 20px; padding: 30px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .btn-action { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source id="bg-source" src="jujutsu.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <main>
            <div class="header">
                <div class="logo">AETHER</div>
                <div style="cursor:pointer; font-size: 24px;" onclick="openModal()">⚙️</div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search song name or paste YouTube URL..." onkeydown="if(event.key==='Enter') smartLoad(this.value)">
                <button class="btn-action" style="width:auto; margin:0;" onclick="smartLoad(document.getElementById('search-input').value)">GO</button>
            </div>

            <div class="grid" id="main-grid"></div>
        </main>

        <footer>
            <div style="display: flex; align-items: center; gap: 12px;">
                <img id="hud-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <div style="overflow:hidden">
                    <div id="hud-title" style="font-weight:bold; font-size:14px; white-space:nowrap;">Standing By</div>
                    <div id="hud-artist" style="font-size:12px; color:var(--text-sub);">Aether Engine</div>
                </div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                <button class="main-btn" id="play-main" onclick="togglePlay()">▶</button>
                <input type="range" id="seek" style="width:100%" value="0" step="1" oninput="seek(this.value)">
            </div>
            <div style="text-align:right;">
                <input type="range" style="width:80px;" oninput="setVol(this.value)" value="80">
            </div>
        </footer>
    </div>

    <div id="modal-overlay" class="modal">
        <div class="modal-box">
            <div style="display:flex; gap:15px; margin-bottom:20px;">
                <button onclick="showTab('set')" style="background:none; color:white; border:none; cursor:pointer; font-weight:bold;">Settings</button>
                <button onclick="showTab('cred')" style="background:none; color:white; border:none; cursor:pointer; font-weight:bold;">Credits</button>
            </div>

            <div id="tab-set" class="tab-content active">
                <div class="setting-row">
                    <label>Accent Color</label>
                    <input type="color" id="accent-color" oninput="updateUI('accent', this.value)">
                </div>
                <div class="setting-row">
                    <label>Background MP4 URL</label>
                    <input type="text" id="bg-input" placeholder="Paste .mp4 link..." style="background:#222; border:1px solid #444; color:white; padding:5px;">
                </div>
                <button class="btn-action" onclick="changeBackground()">Update Background</button>
            </div>

            <div id="tab-cred" class="tab-content">
                <p style="color:var(--text-sub); line-height:1.6;">
                    <strong>Aether WEBPLAYER</strong><br>
                    Engine: YouTube IFrame API<br>
                    Developer: User & Gemini<br><br>
                    <em>Text List:</em><br>
                    - Domain Expansion: Active<br>
                    - GitHub Hosting: Optimized<br>
                    - Background: Dynamic MP4
                </p>
            </div>
            <button class="btn-action" style="background:#333;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <div id="yt-engine" style="position: absolute; top: -9999px;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt;
        const instances = ["https://pipedapi.kavin.rocks", "https://api.piped.video", "https://pipedapi.reble.xyz"];

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0, 'origin': window.location.origin },
                events: { 'onStateChange': (e) => { if(e.data === 1) setInterval(updateProgress, 1000); } }
            });
        }

        // SMART LOAD: Handles both search and direct links
        async function smartLoad(input) {
            if(!input) return;
            // Check if input is a YouTube URL
            const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = input.match(ytRegex);
            
            if(match) {
                playTrack(match[1], "Direct Stream", "YouTube Link", "");
            } else {
                search(input);
            }
        }

        async function search(q) {
            for (let base of instances) {
                try {
                    const res = await fetch(`${base}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                    const data = await res.json();
                    const grid = document.getElementById('main-grid');
                    grid.innerHTML = '';
                    data.items.slice(0, 15).forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => playTrack(s.url.split('v=')[1], s.title, s.uploaderName, s.thumbnail);
                        card.innerHTML = `<img src="${s.thumbnail}"><div class="card-title">${s.title}</div>`;
                        grid.appendChild(card);
                    });
                    return;
                } catch(e) { continue; }
            }
        }

        function playTrack(id, title, artist, art) {
            yt.loadVideoById(id);
            document.getElementById('hud-title').innerText = title;
            document.getElementById('hud-artist').innerText = artist;
            if(art) document.getElementById('hud-art').src = art;
            document.getElementById('play-main').innerText = '⏸';
        }

        function togglePlay() {
            const s = yt.getPlayerState();
            if(s === 1) { yt.pauseVideo(); document.getElementById('play-main').innerText = '▶'; }
            else { yt.playVideo(); document.getElementById('play-main').innerText = '⏸'; }
        }

        function updateProgress() {
            document.getElementById('seek').max = yt.getDuration();
            document.getElementById('seek').value = yt.getCurrentTime();
        }

        function changeBackground() {
            const url = document.getElementById('bg-input').value;
            if(!url) return;
            const video = document.getElementById('video-bg');
            const source = document.getElementById('bg-source');
            source.src = url;
            video.load();
            video.play();
            localStorage.setItem('aether-bg', url);
        }

        function updateUI(type, val) {
            if(type === 'accent') document.documentElement.style.setProperty('--accent', val);
        }

        function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function showTab(t) {
            document.getElementById('tab-set').classList.toggle('active', t === 'set');
            document.getElementById('tab-cred').classList.toggle('active', t === 'cred');
        }

        function setVol(v) { yt.setVolume(v); }
        function seek(v) { yt.seekTo(v); }

        window.onload = () => {
            const savedBg = localStorage.getItem('aether-bg');
            if(savedBg) {
                document.getElementById('bg-source').src = savedBg;
                document.getElementById('video-bg').load();
            }
            // Force play video on first click (browser requirement)
            document.body.addEventListener('click', () => {
                document.getElementById('video-bg').play();
            }, { once: true });
        };
    </script>
</body>
</html>

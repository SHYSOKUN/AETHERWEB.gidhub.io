<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ffffff; 
            --bg-dim: rgba(0, 0, 0, 0.15); 
            --font-title: 'Playfair Display', serif;
            --font-ui: 'Noto Sans JP', sans-serif;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: var(--font-ui); color: white;
            overflow: hidden; background: #000;
        }

        /* FULLSCREEN ANIME BACKGROUND */
        #video-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; object-fit: cover;
        }

        .app-container {
            display: grid; grid-template-rows: 1fr 120px; height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 50%, rgba(0,0,0,0.6) 100%);
            position: relative; z-index: 10;
        }

        main { padding: 50px; overflow-y: auto; scrollbar-width: none; }

        /* MINIMALIST ANIME LOGO */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { 
            font-family: var(--font-title); font-size: 48px; font-style: italic;
            border-bottom: 2px solid white; line-height: 1; padding-bottom: 5px;
        }

        /* CLEAN SEARCH */
        .search-container { max-width: 600px; margin-bottom: 50px; }
        .search-bar { 
            display: flex; border-bottom: 1px solid rgba(255,255,255,0.5); 
            padding: 10px 0; transition: 0.3s;
        }
        .search-bar:focus-within { border-bottom: 1px solid white; }
        .search-bar input { 
            background: transparent; border: none; color: white; flex: 1; 
            font-size: 18px; outline: none; font-weight: 300;
        }
        .search-btn { background: transparent; border: none; color: white; cursor: pointer; font-size: 14px; letter-spacing: 2px; }

        /* GRID - POSTER STYLE */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .card { cursor: pointer; transition: 0.4s; position: relative; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card div { margin-top: 10px; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; opacity: 0.9; }

        /* ANIME HUD */
        footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 60px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
        }

        .now-playing { display: flex; align-items: center; gap: 20px; width: 300px; }
        #hud-art { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; border: 2px solid white; }
        #hud-title { font-family: var(--font-title); font-size: 20px; font-style: italic; }

        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
        .play-btn { background: white; color: black; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .play-btn:hover { transform: scale(1.1); }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 15px; font-size: 12px; }
        #seek { flex: 1; height: 2px; accent-color: white; cursor: pointer; }

        .right-tools { display: flex; align-items: center; gap: 25px; width: 300px; justify-content: flex-end; }
        .loop-btn { background: transparent; border: 1px solid white; color: white; border-radius: 20px; padding: 5px 15px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .loop-active { background: white; color: black; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { width: 350px; text-align: center; border-top: 4px solid white; background: rgba(0,0,0,0.8); padding: 40px; }
    </style>
</head>
<body onclick="document.getElementById('video-bg').play()">

    <video id="video-bg" loop muted playsinline>
        <source src="jujutsu.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <main>
            <div class="header">
                <div class="logo">Aether WEBPLAYER</div>
                <div style="display:flex; gap:30px;">
                    <span style="cursor:pointer; font-size: 12px; letter-spacing: 2px;" onclick="openModal('credits')">CREDITS</span>
                    <span style="cursor:pointer; font-size: 12px; letter-spacing: 2px;" onclick="openModal('settings')">SETTINGS</span>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search track or playlist..." onkeydown="if(event.key==='Enter') smartLoad(this.value)">
                    <button class="search-btn" onclick="smartLoad(document.getElementById('search-input').value)">FIND</button>
                </div>
            </div>

            <div class="grid" id="main-grid"></div>
        </main>

        <footer>
            <div class="now-playing">
                <img id="hud-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <div style="overflow:hidden">
                    <div id="hud-title">Title</div>
                    <div id="hud-artist" style="font-size:11px; opacity:0.6;">Artist</div>
                </div>
            </div>

            <div class="player-controls">
                <div style="display:flex; gap:40px; align-items:center;">
                    <button style="background:none; border:none; color:white; cursor:pointer;" onclick="yt.previousVideo()">PREV</button>
                    <button class="play-btn" id="play-main" onclick="togglePlay()">▶</button>
                    <button style="background:none; border:none; color:white; cursor:pointer;" onclick="yt.nextVideo()">NEXT</button>
                </div>
                <div class="progress-container">
                    <span id="time-curr">0:00</span>
                    <input type="range" id="seek" value="0" step="1" oninput="seek(this.value)">
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="right-tools">
                <button id="loop-btn" class="loop-btn" onclick="toggleLoop()">LOOP: OFF</button>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-size:10px; opacity:0.5;">VOL</span>
                    <input type="range" oninput="setVol(this.value)" value="15" style="width:70px; accent-color:white;">
                </div>
            </div>
        </footer>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-box">
            <h2 style="font-family:var(--font-title); font-style:italic;">Settings</h2>
            <div style="display:flex; justify-content:space-between; margin:25px 0;">
                <label style="font-size:11px; letter-spacing:1px;">UI OPACITY</label>
                <input type="range" min="0" max="100" value="40" oninput="updateUI('opacity', this.value)">
            </div>
            <button class="search-btn" style="border:1px solid white; padding:10px 30px;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <div id="credits-modal" class="modal">
        <div class="modal-box">
            <h2 style="font-family:var(--font-title); font-style:italic;">Credits</h2>
            <p style="font-size:12px; opacity:0.7; line-height:2;">
                Aether Engine v5.0<br>
                Visuals: jujutsu.mp4<br>
                Aesthetic: Minimalist Anime Shell
            </p>
            <button class="search-btn" style="border:1px solid white; padding:10px 30px;" onclick="closeModal()">BACK</button>
        </div>
    </div>

    <div id="yt-engine" style="position: absolute; top: -9999px;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, isLooping = false;
        const instances = ["https://pipedapi.kavin.rocks", "https://api.piped.video"];

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 
                    'onReady': (e) => e.target.setVolume(15),
                    'onStateChange': (e) => { 
                        if(e.data === 1) {
                            const data = yt.getVideoData();
                            document.getElementById('hud-title').innerText = data.title;
                            document.getElementById('hud-artist').innerText = data.author;
                            document.getElementById('play-main').innerText = '⏸';
                            setInterval(updateProg, 1000);
                        }
                        if(e.data === 0 && isLooping) yt.playVideo();
                    }
                }
            });
        }

        async function smartLoad(input) {
            if(!input) return;
            const vidMatch = input.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            if(vidMatch) yt.loadVideoById(vidMatch[1]);
            else search(input);
        }

        async function search(q) {
            for (let base of instances) {
                try {
                    const res = await fetch(`${base}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                    const data = await res.json();
                    const grid = document.getElementById('main-grid');
                    grid.innerHTML = '';
                    data.items.slice(0, 10).forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => yt.loadVideoById(s.url.split('v=')[1]);
                        card.innerHTML = `<img src="${s.thumbnail}"><div>${s.title}</div>`;
                        grid.appendChild(card);
                    });
                    return;
                } catch(e) { continue; }
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loop-btn');
            btn.innerText = isLooping ? "LOOP: ON" : "LOOP: OFF";
            btn.classList.toggle('loop-active', isLooping);
        }

        function togglePlay() { if(yt.getPlayerState() === 1) yt.pauseVideo(); else yt.playVideo(); }
        function openModal(id) { document.getElementById(id + '-modal').style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function updateUI(type, val) { if(type === 'opacity') document.querySelector('footer').style.background = `rgba(0,0,0,${val/100})`; }
        function updateProg() { document.getElementById('seek').max = yt.getDuration(); document.getElementById('seek').value = yt.getCurrentTime(); }
        function setVol(v) { yt.setVolume(v); }
        function seek(v) { yt.seekTo(v); }
    </script>
</body>
</html>

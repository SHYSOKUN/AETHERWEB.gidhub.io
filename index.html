<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@100;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff0033; 
            --glass: rgba(0, 0, 0, 0.85);
            --font-logo: 'Cinzel Decorative', serif;
            --font-jp: 'Noto Sans JP', sans-serif;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: var(--font-jp); color: white;
            overflow: hidden; background: #000; /* Falls back to black if video fails */
        }

        /* MASTER VIDEO ENGINE */
        #video-bg {
            position: fixed; inset: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; 
            filter: brightness(0.4) saturate(1.1);
            background: #000;
        }

        .vignette {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        .app-shell {
            display: grid; grid-template-rows: auto 1fr auto;
            height: 100vh; position: relative; z-index: 10;
        }

        header { padding: 30px 60px; display: flex; justify-content: space-between; align-items: center; }
        .logo-group { border-left: 3px solid var(--accent); padding-left: 20px; }
        .logo { font-family: var(--font-logo); font-size: 30px; letter-spacing: 2px; }
        
        .nav-tools { display: flex; gap: 20px; }
        .btn-sys { 
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white;
            padding: 8px 20px; font-size: 10px; cursor: pointer; letter-spacing: 2px;
            text-transform: uppercase;
        }
        .btn-sys:hover { border-color: var(--accent); color: var(--accent); }

        .search-container { padding: 0 60px; margin-bottom: 10px; }
        .search-box { 
            width: 400px; border-bottom: 1px solid rgba(255,255,255,0.3); 
            display: flex; align-items: center; 
        }
        .search-box input {
            background: transparent; border: none; color: white; padding: 12px 0;
            font-size: 16px; outline: none; flex: 1;
        }

        .results { 
            padding: 20px 60px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; overflow-y: auto;
        }
        .song-card { cursor: pointer; background: rgba(255,255,255,0.03); transition: 0.3s; }
        .song-card:hover { border: 1px solid var(--accent); background: rgba(255,0,51,0.05); }
        .song-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .song-card div { padding: 10px; font-size: 11px; font-weight: 900; }

        footer {
            background: var(--glass); border-top: 1px solid rgba(255,255,255,0.1);
            display: grid; grid-template-columns: 1.5fr 2fr 1.5fr; 
            padding: 20px 60px; align-items: center;
        }

        #hud-title { font-weight: 900; font-size: 18px; color: var(--accent); }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 1px solid white; background: transparent; color: white; cursor: pointer; }

        /* MODAL */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }
        .modal-box { width: 400px; border: 1px solid var(--accent); padding: 40px; background: #000; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .v-opt { padding: 10px; border: 1px solid #333; text-align: center; cursor: pointer; font-size: 10px; }
        .v-opt.active { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body onclick="wakeVideo()">

    <video id="video-bg" loop muted playsinline autoplay>
        <source id="bg-source" src="akatsuki.mp4" type="video/mp4">
    </video>
    <div class="vignette"></div>

    <div class="app-shell">
        <header>
            <div class="logo-group">
                <div class="logo">Aether WEBPLAYER</div>
            </div>
            <div class="nav-tools">
                <button class="btn-sys" onclick="openM('settings')">SETTINGS</button>
            </div>
        </header>

        <section>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="si" placeholder="SEARCH..." onkeydown="if(event.key==='Enter') smartLoad(this.value)">
                </div>
            </div>
            <div class="results" id="main-grid"></div>
        </section>

        <footer>
            <div style="display:flex; align-items:center; gap:20px;">
                <img id="hud-art" src="" style="width:50px; height:50px; border:1px solid var(--accent); background:#111;">
                <div>
                    <div id="hud-title">OFFLINE</div>
                    <div id="hud-artist" style="font-size:10px; opacity:0.5;">READY FOR INPUT</div>
                </div>
            </div>

            <div style="text-align:center;">
                <button class="btn-circle" id="play-main" onclick="togglePlay()">▶</button>
                <div style="display:flex; align-items:center; gap:10px; margin-top:10px; font-size:10px;">
                    <span id="time-curr">0:00</span>
                    <input type="range" id="seek" value="0" step="1" oninput="seek(this.value)" style="flex:1; accent-color:var(--accent);">
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div style="display:flex; justify-content:flex-end; align-items:center; gap:15px;">
                <span style="font-family:var(--font-logo); color:var(--accent); font-size:20px;" id="v-num">15</span>
                <input type="range" oninput="setVol(this.value)" value="15" min="0" max="100" style="width:80px; accent-color:var(--accent);">
            </div>
        </footer>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-box">
            <h2 style="font-family:var(--font-logo); color:var(--accent);">SETTINGS</h2>
            <p style="font-size:10px; opacity:0.5;">SELECT BACKGROUND ENGINE</p>
            <div class="video-grid">
                <div class="v-opt" onclick="changeBG('jujutsu.mp4', this)">JUJUTSU</div>
                <div class="v-opt" onclick="changeBG('zenitsu.mp4', this)">ZENITSU</div>
                <div class="v-opt" onclick="changeBG('cyberpunk.mp4', this)">CYBERPUNK</div>
                <div class="v-opt active" onclick="changeBG('akatsuki.mp4', this)">AKATSUKI</div>
            </div>
            <button class="btn-sys" style="width:100%; border-color:var(--accent);" onclick="closeM()">CONFIRM</button>
        </div>
    </div>

    <div id="yt-engine" style="position: absolute; top: -9999px;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt;
        const instances = ["https://pipedapi.kavin.rocks", "https://api.piped.video"];

        // FORCE VIDEO START ON CLICK
        function wakeVideo() {
            const v = document.getElementById('video-bg');
            v.play().catch(e => console.log("Autoplay blocked, waiting for user..."));
        }

        function changeBG(file, el) {
            const video = document.getElementById('video-bg');
            const source = document.getElementById('bg-source');
            document.querySelectorAll('.v-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            
            source.src = file;
            video.load();
            video.play().catch(e => console.error("File not found or blocked:", file));
        }

        // --- Standard Player Logic ---
        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                events: { 
                    'onReady': (e) => e.target.setVolume(15),
                    'onStateChange': (e) => { 
                        if(e.data === 1) {
                            const d = yt.getVideoData();
                            document.getElementById('hud-title').innerText = d.title.toUpperCase();
                            document.getElementById('play-main').innerText = '⏸';
                            setInterval(updateProg, 500);
                        }
                    }
                }
            });
        }

        function updateProg() {
            const c = yt.getCurrentTime(), t = yt.getDuration();
            document.getElementById('seek').max = t;
            document.getElementById('seek').value = c;
            document.getElementById('time-curr').innerText = formatTime(c);
            document.getElementById('time-total').innerText = formatTime(t);
        }

        function formatTime(s) {
            const m = Math.floor(s/60), sc = Math.floor(s%60);
            return `${m}:${sc < 10 ? '0' : ''}${sc}`;
        }

        async function smartLoad(input) {
            const vidMatch = input.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            if(vidMatch) yt.loadVideoById(vidMatch[1]);
            else search(input);
        }

        async function search(q) {
            for (let base of instances) {
                try {
                    const res = await fetch(`${base}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                    const data = await res.json();
                    const grid = document.getElementById('main-grid');
                    grid.innerHTML = '';
                    data.items.slice(0, 10).forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'song-card';
                        card.onclick = () => { yt.loadVideoById(s.url.split('v=')[1]); document.getElementById('hud-art').src = s.thumbnail; };
                        card.innerHTML = `<img src="${s.thumbnail}"><div>${s.title}</div>`;
                        grid.appendChild(card);
                    });
                    return;
                } catch(e) { continue; }
            }
        }

        function togglePlay() { yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo(); }
        function setVol(v) { yt.setVolume(v); document.getElementById('v-num').innerText = v; }
        function seek(v) { yt.seekTo(v); }
        function openM(id) { document.getElementById(id + '-modal').style.display = 'flex'; }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>

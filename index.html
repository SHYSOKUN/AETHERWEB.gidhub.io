<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff0000; 
            --font-logo: 'Cinzel', serif;
            --font-ui: 'Noto Sans JP', sans-serif;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: var(--font-ui); color: white;
            overflow: hidden; background: #000;
        }

        #video-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; object-fit: cover;
            filter: brightness(0.4);
            pointer-events: none;
        }

        .app-container {
            display: grid; grid-template-rows: 1fr 120px; height: 100vh;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.6) 100%);
            position: relative; z-index: 10;
        }

        main { padding: 40px; overflow-y: auto; scrollbar-width: none; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { 
            font-family: var(--font-logo); font-size: 42px; 
            color: var(--accent); letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .search-bar { 
            display: flex; border-bottom: 2px solid var(--accent); 
            padding: 10px 0; max-width: 500px; margin-bottom: 40px;
        }
        .search-bar input { 
            background: transparent; border: none; color: white; flex: 1; 
            font-size: 16px; outline: none;
        }
        .search-btn { background: var(--accent); border: none; color: white; cursor: pointer; padding: 5px 20px; font-family: var(--font-logo); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.05); padding: 10px; }
        .card:hover { background: rgba(255,0,0,0.1); border: 1px solid var(--accent); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card div { margin-top: 8px; font-size: 11px; text-transform: uppercase; overflow: hidden; height: 1.2em; }

        footer { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; 
            padding: 0 40px; background: rgba(10, 0, 0, 0.98); 
            border-top: 4px solid var(--accent);
        }

        .track-info { display: flex; align-items: center; gap: 15px; }
        #hud-art { width: 60px; height: 60px; border: 1px solid var(--accent); }
        #hud-title { font-family: var(--font-logo); font-size: 18px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .play-btn { background: var(--accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        
        .progress-wrap { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 11px; font-family: monospace; color: var(--accent); }
        #seek { flex: 1; accent-color: var(--accent); cursor: pointer; height: 2px; }

        .ops { display: flex; align-items: center; gap: 15px; justify-content: flex-end; }
        .loop-btn { background: none; border: 1px solid #333; color: white; padding: 5px 12px; font-size: 10px; cursor: pointer; }
        .loop-active { border-color: var(--accent); color: var(--accent); }
        
        .vol-display { font-family: monospace; font-size: 12px; color: var(--accent); min-width: 30px; text-align: right; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { width: 380px; background: #050000; border: 2px solid var(--accent); padding: 30px; }
        .modal-box h2 { font-family: var(--font-logo); color: var(--accent); margin-top: 0; }
    </style>
</head>
<body onclick="wakeEngine()">

    <video id="video-bg" loop muted playsinline autoplay>
        <source src="akatsuki.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <main>
            <div class="header">
                <div class="logo">Aether WEBPLAYER</div>
                <div style="display:flex; gap:25px;">
                    <span style="cursor:pointer; font-size: 12px; font-family: var(--font-logo); opacity: 0.6;" onclick="modal('credits')">CREDITS</span>
                    <span style="cursor:pointer; font-size: 12px; font-family: var(--font-logo); color: var(--accent);" onclick="modal('settings')">SETTINGS</span>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="SEARCH CLOUDS..." onkeydown="if(event.key==='Enter') smartLoad(this.value)">
                <button class="search-btn" onclick="smartLoad(document.getElementById('search-input').value)">GO</button>
            </div>

            <div class="grid" id="main-grid"></div>
        </main>

        <footer>
            <div class="track-info">
                <img id="hud-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <div style="overflow: hidden;">
                    <div id="hud-title">UPLINK_READY</div>
                    <div id="hud-artist" style="font-size:10px; opacity:0.4;">Waiting...</div>
                </div>
            </div>

            <div class="controls">
                <div style="display:flex; gap:40px; align-items:center;">
                    <button style="background:none; border:none; color:white; cursor:pointer;" onclick="yt.previousVideo()">⏮</button>
                    <button class="play-btn" id="play-main" onclick="togglePlay()">▶</button>
                    <button style="background:none; border:none; color:white; cursor:pointer;" onclick="yt.nextVideo()">⏭</button>
                </div>
                <div class="progress-wrap">
                    <span id="time-curr">0:00</span>
                    <input type="range" id="seek" value="0" step="1" oninput="seek(this.value)">
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="ops">
                <button id="loop-btn" class="loop-btn" onclick="toggleLoop()">LOOP: OFF</button>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="vol-display" id="vol-num">15</span>
                    <input type="range" oninput="setVol(this.value)" value="15" min="0" max="100" style="width:70px; accent-color:var(--accent);">
                </div>
            </div>
        </footer>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-box">
            <h2>SETTINGS</h2>
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <label>ACCENT</label>
                <input type="color" value="#ff0000" oninput="updateUI('accent', this.value)">
            </div>
            <button class="search-btn" style="width:100%; padding:12px;" onclick="closeM()">CLOSE</button>
        </div>
    </div>

    <div id="credits-modal" class="modal">
        <div class="modal-box">
            <h2>CREDITS</h2>
            <p style="font-size:11px; line-height:2.2; color: #888;">
                CORE: AETHER ENGINE 9.0<br>
                BG: AKATSUKI.MP4<br>
                HUD: BLOOD CLOUD V4
            </p>
            <button class="search-btn" style="width:100%; padding:12px;" onclick="closeM()">RETURN</button>
        </div>
    </div>

    <div id="yt-engine" style="position: absolute; top: -9999px;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, isLooping = false;
        const instances = ["https://pipedapi.kavin.rocks", "https://api.piped.video"];

        function wakeEngine() {
            const v = document.getElementById('video-bg');
            if(v.paused) v.play().catch(()=>{});
        }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 
                    'onReady': (e) => e.target.setVolume(15),
                    'onStateChange': (e) => { 
                        if(e.data === 1) {
                            const d = yt.getVideoData();
                            document.getElementById('hud-title').innerText = d.title.toUpperCase();
                            document.getElementById('hud-artist').innerText = d.author.toUpperCase();
                            document.getElementById('play-main').innerText = '⏸';
                            setInterval(updateProg, 500);
                        }
                    }
                }
            });
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return "0:00";
            const mins = Math.floor(s / 60);
            const secs = Math.floor(s % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function updateProg() {
            if (yt && yt.getCurrentTime) {
                const curr = yt.getCurrentTime();
                const total = yt.getDuration();
                document.getElementById('seek').max = total;
                document.getElementById('seek').value = curr;
                document.getElementById('time-curr').innerText = formatTime(curr);
                document.getElementById('time-total').innerText = formatTime(total);
            }
        }

        async function smartLoad(input) {
            if(!input) return;
            const vidMatch = input.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            if(vidMatch) yt.loadVideoById(vidMatch[1]);
            else search(input);
        }

        async function search(q) {
            for (let base of instances) {
                try {
                    const res = await fetch(`${base}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                    const data = await res.json();
                    const grid = document.getElementById('main-grid');
                    grid.innerHTML = '';
                    data.items.slice(0, 10).forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => yt.loadVideoById(s.url.split('v=')[1]);
                        card.innerHTML = `<img src="${s.thumbnail}"><div>${s.title}</div>`;
                        grid.appendChild(card);
                    });
                    return;
                } catch(e) { continue; }
            }
        }

        function toggleLoop() {
            isLooping = !isLooping;
            const btn = document.getElementById('loop-btn');
            btn.innerText = isLooping ? "LOOP: ON" : "LOOP: OFF";
            btn.classList.toggle('loop-active', isLooping);
        }

        function togglePlay() { if(yt.getPlayerState() === 1) yt.pauseVideo(); else yt.playVideo(); }
        function modal(id) { document.getElementById(id + '-modal').style.display = 'flex'; }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        
        function setVol(v) { 
            yt.setVolume(v); 
            document.getElementById('vol-num').innerText = v;
        }

        function seek(v) { yt.seekTo(v); }
        function updateUI(type, val) { if(type === 'accent') document.documentElement.style.setProperty('--accent', val); }
    </script>
</body>
</html>

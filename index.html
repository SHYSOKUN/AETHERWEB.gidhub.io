<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether WEBPLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@100;400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff0033; 
            --glass: rgba(0, 0, 0, 0.96);
            --font-logo: 'Cinzel Decorative', serif;
            --font-jp: 'Noto Sans JP', sans-serif;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: var(--font-jp); color: white;
            background: #000; overflow: hidden; touch-action: manipulation;
        }

        /* LIVE URL BACKGROUND ENGINE */
        #video-bg {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2; object-fit: cover;
            filter: brightness(0.4) contrast(1.1) saturate(1.2);
        }

        .vignette {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle, transparent 10%, #000 100%);
            pointer-events: none;
        }

        .main-ui {
            display: grid; grid-template-rows: auto 1fr auto;
            height: 100vh; width: 100%; position: relative; z-index: 10;
        }

        /* HEADER */
        header { padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; }
        .branding h1 { 
            font-family: var(--font-logo); font-size: clamp(28px, 6vw, 48px); 
            margin: 0; letter-spacing: 8px; color: white; text-shadow: 0 0 25px var(--accent);
        }

        .sys-btn { 
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 10px 25px; font-size: 11px; cursor: pointer;
            letter-spacing: 3px; font-weight: 900; transition: 0.3s;
        }
        .sys-btn:hover { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent); }

        /* SEARCH BAR - MASSIVE */
        .search-wrap { padding: 15px 40px; display: flex; justify-content: center; }
        .search-bar {
            background: rgba(255, 255, 255, 0.04); border: 1px solid #1a1a1a;
            padding: 22px 30px; width: 100%; max-width: 850px; 
            color: white; font-size: 18px; outline: none;
            border-left: 6px solid var(--accent); transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        .search-bar:focus { border-color: var(--accent); width: 100%; max-width: 900px; background: #000; }

        /* CONTENT GRID */
        .scroll-area { 
            padding: 20px 40px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; overflow-y: auto; scrollbar-width: none;
        }
        .card { cursor: pointer; background: #050505; border: 1px solid #111; transition: 0.3s ease; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; opacity: 0.55; transition: 0.3s; }
        .card:hover img { opacity: 0.9; }
        .card-info { padding: 18px; font-size: 12px; font-weight: 900; color: #fff; letter-spacing: 1px; }

        /* HUD FOOTER */
        footer {
            background: var(--glass); border-top: 3px solid var(--accent);
            display: grid; grid-template-columns: 1fr; padding: 25px;
            align-items: center; backdrop-filter: blur(30px); gap: 20px;
        }
        @media (min-width: 900px) { footer { grid-template-columns: 1.3fr 2fr 1.3fr; padding: 25px 60px; } }

        .track-box { display: flex; align-items: center; gap: 20px; }
        #track-art { width: 65px; height: 65px; border: 1px solid var(--accent); object-fit: cover; }
        #track-name { font-weight: 900; font-size: 18px; color: white; text-transform: uppercase; }

        .controls { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .main-btns { display: flex; gap: 40px; align-items: center; }
        .play-btn { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--accent); background: transparent; color: white; cursor: pointer; font-size: 24px; transition: 0.3s; }
        .play-btn:hover { background: var(--accent); box-shadow: 0 0 20px var(--accent); }

        .scrub-box { width: 100%; max-width: 600px; display: flex; align-items: center; gap: 12px; font-family: monospace; font-size: 12px; color: #444; }
        #scrub { flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 500px; border: 1px solid var(--accent); padding: 45px; background: #000; box-shadow: 0 0 50px rgba(255,0,51,0.2); }
        
        .credits-box { background: #080808; border-left: 3px solid var(--accent); padding: 20px; font-family: monospace; font-size: 11px; color: #555; line-height: 2; }
        .credits-box b { color: var(--accent); letter-spacing: 2px; }
    </style>
</head>
<body onclick="forceStart()">

    <video autoplay muted loop playsinline id="video-bg">
        <source src="https://motionbgs.com/media/893/akatsuki-naruto.960x540.mp4" type="video/mp4">
    </video>
    <div class="vignette"></div>

    <div class="main-ui">
        <header>
            <div class="branding"><h1>AETHER</h1></div>
            <button class="sys-btn" onclick="openM()">SYSTEM CREDITS</button>
        </header>

        <main>
            <div class="search-wrap">
                <input type="text" class="search-bar" id="si" placeholder="YOU SONG OR URL LINK HERE (HIT ENTER!)" onkeydown="if(event.key==='Enter') startSearch(this.value)">
            </div>
            <div class="scroll-area" id="grid"></div>
        </main>

        <footer>
            <div class="track-box">
                <img id="track-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                <div>
                    <div id="track-name">READY FOR INPUT</div>
                    <div id="loop-stat" style="font-size:10px; color:var(--accent); letter-spacing:2px; font-weight:900;">LOOP ENGINE: IDLE</div>
                </div>
            </div>

            <div class="controls">
                <div class="main-btns">
                    <button onclick="yt.previousVideo()" style="background:none; border:none; color:#333; cursor:pointer; font-weight:900;">PREV</button>
                    <button class="play-btn" id="m-play" onclick="toggleP()">▶</button>
                    <button id="loop-btn" onclick="toggleLoop()" style="background:none; border:none; color:#333; cursor:pointer; font-weight:900; letter-spacing:2px;">LOOP</button>
                    <button onclick="yt.nextVideo()" style="background:none; border:none; color:#333; cursor:pointer; font-weight:900;">NEXT</button>
                </div>
                <div class="scrub-box">
                    <span id="c-time">0:00</span>
                    <input type="range" id="scrub" value="0" step="1" oninput="seek(this.value)">
                    <span id="t-time">0:00</span>
                </div>
            </div>

            <div style="display:flex; justify-content:flex-end; align-items:center; gap:20px;">
                <div id="v-val" style="font-family:var(--font-logo); color:var(--accent); font-size:32px;">15</div>
                <input type="range" oninput="setV(this.value)" value="15" min="0" max="100" style="width:100px; accent-color:var(--accent);">
            </div>
        </footer>
    </div>

    <div id="credits" class="modal">
        <div class="modal-box">
            <h2 style="font-family:var(--font-logo); color:var(--accent); margin:0 0 30px 0; letter-spacing:5px;">STATION LOG</h2>
            <div class="credits-box">
                CORE DEVELOPER:SHYSOKUN <b></b><br>
                HUD: <b>VIPBUSTED</b><br>
                SUB: <b>COMMING SOON</b>
            </div>
            <button class="sys-btn" style="width:100%; margin-top:30px;" onclick="closeM()">DISMISS</button>
        </div>
    </div>

    <div id="yt-api" style="position: absolute; top: -9999px;"><div id="player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let yt, isLooping = false;
        const bases = ["https://pipedapi.kavin.rocks", "https://api.piped.video"];

        function forceStart() { document.getElementById('video-bg').play().catch(e=>{}); }

        function onYouTubeIframeAPIReady() {
            yt = new YT.Player('player', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 
                    'onReady': (e) => e.target.setVolume(15),
                    'onStateChange': (e) => { 
                        if(e.data === 1) {
                            document.getElementById('track-name').innerText = yt.getVideoData().title.toUpperCase();
                            document.getElementById('m-play').innerText = '⏸';
                            setInterval(update, 500);
                        }
                        if(e.data === 0 && isLooping) { yt.playVideo(); }
                    }
                }
            });
        }

        function toggleLoop() {
            isLooping = !isLooping;
            document.getElementById('loop-btn').style.color = isLooping ? 'var(--accent)' : '#333';
            document.getElementById('loop-stat').innerText = isLooping ? 'LOOP ENGINE: ACTIVE' : 'LOOP ENGINE: IDLE';
        }

        function update() {
            if (yt && yt.getCurrentTime) {
                const c = yt.getCurrentTime(), t = yt.getDuration();
                document.getElementById('scrub').max = t;
                document.getElementById('scrub').value = c;
                document.getElementById('c-time').innerText = fmt(c);
                document.getElementById('t-time').innerText = fmt(t);
            }
        }

        function fmt(s) {
            const m = Math.floor(s/60), sc = Math.floor(s%60);
            return `${m}:${sc < 10 ? '0' : ''}${sc}`;
        }

        async function startSearch(q) {
            const vidMatch = q.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
            if(vidMatch) { yt.loadVideoById(vidMatch[1]); return; }

            for (let b of bases) {
                try {
                    const r = await fetch(`${b}/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                    const d = await r.json();
                    const g = document.getElementById('grid');
                    g.innerHTML = '';
                    d.items.slice(0, 12).forEach(i => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.onclick = () => { yt.loadVideoById(i.url.split('v=')[1]); document.getElementById('track-art').src = i.thumbnail; };
                        div.innerHTML = `<img src="${i.thumbnail}"><div class="card-info">${i.title}</div>`;
                        g.appendChild(div);
                    });
                    return;
                } catch(e) { continue; }
            }
        }

        function toggleP() { yt.getPlayerState() === 1 ? yt.pauseVideo() : yt.playVideo(); }
        function setV(v) { yt.setVolume(v); document.getElementById('v-val').innerText = v; }
        function seek(v) { yt.seekTo(v); }
        function openM() { document.getElementById('credits').style.display = 'flex'; }
        function closeM() { document.getElementById('credits').style.display = 'none'; }
    </script>
</body>
</html>
